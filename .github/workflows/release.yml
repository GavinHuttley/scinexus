name: Release

on: [workflow_dispatch]

jobs:
  test:
    name: "Test on Python ${{ matrix.python-version }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      # Setup env
      - uses: "actions/setup-python@v6"
        with:
            python-version: "${{ matrix.python-version }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: "Run nox for ${{ matrix.python-version }}"
        shell: bash
        run: |
          uv run --group test nox -db uv --force-python python -s test
          uv run --group test nox -db uv --force-python python -s test_types
          uv run --group test nox -db uv --force-python python -s testmpi
          uv run --group test nox -db uv --force-python python -s test_docs

  docbuild:
    name: "Test the docs"
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - uses: "actions/setup-python@v6"
        with:
            python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: "test the docs code"
        run: "uv run --group test zensical build"

  build:
    name: Build wheel and sdist
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload sdist and wheel
        uses: actions/upload-artifact@v7
        with:
          name: snx-wheel-sdist
          path: |
            ./dist/*.whl
            ./dist/*.tar.gz

  release_test:
    name: Release to Test PyPI
    needs: [build, docbuild]
    environment: release_test
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download sdist and wheel
        uses: actions/download-artifact@v8
        with:
          name: snx-wheel-sdist
          path: ./dist

      - name: Publish package distributions to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release:
    name: Release to PyPI
    needs: release_test
    environment: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download sdist and wheel
        uses: actions/download-artifact@v8
        with:
          name: snx-wheel-sdist
          path: ./dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
