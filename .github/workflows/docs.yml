name: Build Docs

concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.readthedocs.yaml'
      - 'zensical.toml'
      - 'rtd_get_docs.py'

permissions:
  contents: read

jobs:
  build-docs:
    if: github.repository == 'cogent3/SciNexus'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: "actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065" # v5.6.0
        with:
            python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Build Documentation
        run: |
          # update executable components
          uv run --group dev nox -s cogdocs
          # build actual docs
          uv run --group dev zensical build --clean
        working-directory: ${{ github.workspace }}

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scinexus-docs-html
          path: site

  trigger_rtd:
    if: github.repository == 'cogent3/SciNexus'
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Trigger Read the Docs build
        env:
          RTDS_WEBHOOK_URL: ${{ secrets.RTDS_WEBHOOK_URL }}
          RTDS_WEBHOOK_TOKEN: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -sS --fail-with-body -X POST \
            --data-urlencode "token=${RTDS_WEBHOOK_TOKEN}" \
            --data-urlencode "branches=${BRANCH}" \
            "${RTDS_WEBHOOK_URL}"
