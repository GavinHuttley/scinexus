name: Build Docs

concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.readthedocs.yaml'
      - 'zensical.toml'
      - 'rtd_get_docs.py'

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: "actions/setup-python@v5"
        with:
            python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Build Documentation
        run: |
          # update executable components
          uv run --group test nox -s cogdocs
          # build actual docs
          uv run --group test zensical build --clean
        working-directory: ${{ github.workspace }}

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scinexus-docs-html
          path: site

  trigger_rtd:
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Trigger Read the Docs build
        env:
          RTDS_WEBHOOK_URL: ${{ secrets.RTDS_WEBHOOK_URL }}
          RTDS_WEBHOOK_TOKEN: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -sS --fail-with-body -X POST \
            --data-urlencode "token=${RTDS_WEBHOOK_TOKEN}" \
            --data-urlencode "branches=${BRANCH}" \
            "${RTDS_WEBHOOK_URL}"
